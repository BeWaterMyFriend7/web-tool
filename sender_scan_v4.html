<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AirGap Scan Accumulator 发送端 V4</title><style>
:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#334155;--primary:#2563eb;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}.wrap{max-width:1320px;margin:18px auto;padding:0 14px}h1{font-size:24px;margin:0 0 6px}.sub{color:var(--muted);line-height:1.6;margin-bottom:12px}.layout{display:grid;grid-template-columns:390px minmax(0,1fr);gap:14px}.panel{background:var(--panel);border:1px solid var(--border);border-radius:16px;padding:14px}textarea{width:100%;min-height:240px;border:1px solid var(--border);border-radius:12px;padding:12px;background:#020617;color:#e5e7eb;font-family:Consolas,Menlo,monospace;line-height:1.55}label{display:block;color:var(--muted);font-size:13px;margin:10px 0 4px}input,select,button{border:1px solid var(--border);border-radius:10px;padding:9px 10px;font-size:14px;background:#020617;color:#e5e7eb}input[type=number]{width:108px}button{background:var(--primary);border-color:var(--primary);color:white;cursor:pointer;margin-right:6px;margin-top:8px}button.secondary{background:#1f2937;border-color:#475569}button.danger{background:#991b1b;border-color:#991b1b}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}.tip{margin-top:10px;padding:10px 12px;border-radius:12px;background:#1e293b;border:1px solid #475569;color:#fbbf24;font-size:13px;line-height:1.55}.info{color:#cbd5e1;font-size:13px;line-height:1.6;margin-top:10px}.stagePanel{background:#020617;border:1px solid var(--border);border-radius:16px;padding:14px;display:flex;flex-direction:column;min-height:720px}.stageHeader{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-bottom:10px}.bigTitle{font-weight:800;font-size:22px;color:white}.chip{border:1px solid #475569;border-radius:999px;padding:4px 10px;color:#cbd5e1;background:#0f172a}.qrStage{position:relative;flex:1;background:#dbeafe;border:8px solid #1e3a8a;border-radius:24px;padding:20px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;box-shadow:inset 0 0 0 5px white}.qrFrame{background:#fff;border:8px solid #111827;border-radius:18px;padding:18px;box-shadow:0 10px 28px rgba(15,23,42,.32);display:flex;align-items:center;justify-content:center;max-width:100%;max-height:100%}#qrCanvas{background:#fff;image-rendering:pixelated;max-width:100%;height:auto}.partLabel{font-size:24px;font-weight:800;color:#1e3a8a;background:#fff;border:3px solid #1e40af;border-radius:999px;padding:8px 18px}.meta{display:flex;justify-content:space-between;gap:10px;width:100%;color:#1f2937;background:#fff;border:2px solid #1e40af;border-radius:12px;padding:8px 12px;font-size:13px}.ok{color:var(--ok);font-weight:700}.err{color:var(--danger);font-weight:700}.warn{color:var(--warn);font-weight:700}body.playMode{background:#fff}body.playMode .wrap{max-width:none;margin:0;padding:0}body.playMode .layout{display:block}body.playMode .layout>.panel:first-child,body.playMode h1,body.playMode .sub{display:none}body.playMode .stagePanel{height:100vh;border:none;border-radius:0;padding:10px;background:#020617}body.playMode .qrStage{border-width:10px;border-radius:26px;padding:18px}body.playMode .stageHeader{padding:0 10px}.log{font-family:Consolas,Menlo,monospace;color:#94a3b8;font-size:12px}@media(max-width:960px){.layout{grid-template-columns:1fr}.stagePanel{min-height:620px}}
</style></head><body><div class="wrap"><h1>AirGap Scan Accumulator 发送端 V4</h1><div class="sub">单个超大二维码分片播放。接收端用 NanoScan 扫码累加，或手动粘贴 QRZ2 内容累加。</div><div class="layout"><section class="panel"><textarea id="input" placeholder="粘贴 JSON / Markdown / 日志 / 配置文本..."></textarea><div class="row"><button id="generate">生成分片</button><button class="secondary" id="clear">清空</button></div><div class="row"><label>每片字节<input id="chunkSize" type="number" value="300" min="120" max="800"></label><label>纠错<select id="ecc"><option value="Q" selected>Q 稳定</option><option value="M">M 容量</option><option value="H">H 最稳</option></select></label><label>QR 像素<input id="scale" type="number" value="14" min="6" max="26"></label><label>留白<input id="quiet" type="number" value="8" min="4" max="14"></label><label>播放间隔 ms<input id="interval" type="number" value="2200" min="800" max="8000"></label></div><label>缺片播放列表，可从接收端复制，例如 3,8,19</label><textarea id="missingInput" style="min-height:80px" placeholder="留空 = 全部分片循环播放"></textarea><div class="row"><button class="secondary" id="prev">上一片</button><button class="secondary" id="next">下一片</button><button id="play">自动播放</button><button class="danger" id="pause">暂停</button><button class="secondary" id="applyMissing">只播放缺片</button><button class="secondary" id="playMode">大屏模式/退出</button></div><div class="tip">推荐：每片 250～350 字节，纠错 Q，留白 8，播放间隔 2000～2500ms。扫不全时，复制缺片列表到这里补扫。</div><div id="info" class="info">等待生成。</div></section><section class="stagePanel"><div class="stageHeader"><div class="bigTitle" id="title">等待生成</div><div class="chip" id="chip">0 / 0</div></div><div class="qrStage"><div class="partLabel" id="partLabel">等待生成</div><div class="qrFrame"><canvas id="qrCanvas"></canvas></div><div class="meta"><span id="sessionMeta">Session -</span><span id="payloadMeta">请用接收端扫码</span></div></div></section></div></div><script>
/*
  单文件多二维码文本传输工具
  - 发送端：UTF-8 文本 -> 按字节安全切片 -> base64url -> 多个标准二维码
  - 接收端：粘贴扫码结果 -> CRC32 校验 -> 自动排序合并 -> 原始文本
  - 二维码算法：Byte 模式，Version 1-40，纠错 L/M/Q/H，无外部依赖
*/
(function() {
  "use strict";

  var ECC_CODEWORDS_PER_BLOCK = [
    [-1,7,10,15,20,26,18,20,24,30,18,20,24,26,30,22,24,28,30,28,28,28,28,30,30,26,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
    [-1,10,16,26,18,24,16,18,22,22,26,30,22,22,24,24,28,28,26,26,26,26,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28,28],
    [-1,13,22,18,26,18,24,18,22,20,24,28,26,24,20,30,24,28,28,26,30,28,30,30,30,30,28,30,30,30,30,30,30,30,30,30,30,30,30,30,30],
    [-1,17,28,22,16,22,28,26,26,24,28,24,28,22,24,24,30,28,28,26,28,30,24,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30,30]
  ];

  var NUM_ERROR_CORRECTION_BLOCKS = [
    [-1,1,1,1,1,1,2,2,2,2,4,4,4,4,4,6,6,6,6,7,8,8,9,9,10,12,12,12,13,14,15,16,17,18,19,19,20,21,22,24,25],
    [-1,1,1,1,2,2,4,4,4,5,5,5,8,9,9,10,10,11,13,14,16,17,17,18,20,21,23,25,26,28,29,31,33,35,37,38,40,43,45,47,49],
    [-1,1,1,2,2,4,4,6,6,8,8,8,10,12,16,12,17,16,18,21,20,23,23,25,27,29,34,34,35,38,40,43,45,48,51,53,56,59,62,65,68],
    [-1,1,1,2,4,4,4,5,6,8,8,11,11,16,16,18,16,19,21,25,25,25,34,30,32,35,37,40,42,45,48,51,54,57,60,63,66,70,74,77,81]
  ];

  var ECC_LEVELS = { L: 0, M: 1, Q: 2, H: 3 };
  var FORMAT_BITS = [1,0,3,2];

  var chunks = [];
  var currentIndex = 0;
  var received = {};

  function $(id) { return document.getElementById(id); }

  function utf8Bytes(str) {
    return Array.from(new TextEncoder().encode(str));
  }

  function bytesToText(bytes) {
    return new TextDecoder("utf-8").decode(new Uint8Array(bytes));
  }

  function base64UrlFromBytes(bytes) {
    var bin = "";
    for (var i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
    return btoa(bin).replace(/\+/g, "-").replace(/\//g, "_").replace(/=+$/g, "");
  }

  function bytesFromBase64Url(s) {
    s = s.replace(/-/g, "+").replace(/_/g, "/");
    while (s.length % 4) s += "=";
    var bin = atob(s);
    var bytes = [];
    for (var i = 0; i < bin.length; i++) bytes.push(bin.charCodeAt(i));
    return bytes;
  }

  function lzwCompressBytes(input) {
    if (!input.length) return [];
    var dict = new Map();
    for (var i = 0; i < 256; i++) dict.set(String.fromCharCode(i), i);
    var dictSize = 256;
    var w = "";
    var codes = [];
    for (var i = 0; i < input.length; i++) {
      var c = String.fromCharCode(input[i]);
      var wc = w + c;
      if (dict.has(wc)) {
        w = wc;
      } else {
        if (w !== "") codes.push(dict.get(w));
        if (dictSize < 65535) dict.set(wc, dictSize++);
        w = c;
      }
    }
    if (w !== "") codes.push(dict.get(w));
    var out = [];
    for (var j = 0; j < codes.length; j++) {
      out.push((codes[j] >>> 8) & 255, codes[j] & 255);
    }
    return out;
  }

  function lzwDecompressBytes(input) {
    if (!input.length) return [];
    if (input.length % 2 !== 0) throw new Error("LZW 数据长度错误");
    var codes = [];
    for (var i = 0; i < input.length; i += 2) codes.push((input[i] << 8) | input[i + 1]);
    var dict = [];
    for (var i = 0; i < 256; i++) dict[i] = [i];
    var dictSize = 256;
    var first = codes[0];
    if (!dict[first]) throw new Error("LZW 首码错误");
    var w = dict[first].slice();
    var out = w.slice();
    for (var k = 1; k < codes.length; k++) {
      var code = codes[k];
      var entry;
      if (dict[code]) entry = dict[code].slice();
      else if (code === dictSize) entry = w.concat([w[0]]);
      else throw new Error("LZW 解码失败，非法码：" + code);
      out = out.concat(entry);
      if (dictSize < 65535) dict[dictSize++] = w.concat([entry[0]]);
      w = entry;
    }
    return out;
  }

  function makeId(rawBytes, payloadBytes, algo) {
    var rawCrc = crc32(rawBytes).toString(16).padStart(8, "0");
    var payloadCrc = crc32(payloadBytes).toString(16).padStart(8, "0");
    return Date.now().toString(36) + rawCrc.slice(0, 4) + payloadCrc.slice(0, 4) + algo.charAt(0);
  }

  function splitBytes(bytes, maxBytes) {
    var list = [];
    for (var i = 0; i < bytes.length; i += maxBytes) {
      list.push(bytes.slice(i, i + maxBytes));
    }
    return list;
  }

  function compressPayload(rawBytes) {
    var mode = $("compressMode").value;
    if (mode === "none") {
      return { algo: "none", bytes: rawBytes.slice(), note: "未压缩" };
    }
    var compressed = lzwCompressBytes(rawBytes);
    if (mode === "auto" && compressed.length >= rawBytes.length) {
      return { algo: "none", bytes: rawBytes.slice(), note: "压缩后没有变小，已自动使用原文传输" };
    }
    return { algo: "lzw", bytes: compressed, note: "LZW 压缩" };
  }

  function decompressPayload(payloadBytes, algo) {
    if (algo === "none") return payloadBytes;
    if (algo === "lzw") return lzwDecompressBytes(payloadBytes);
    throw new Error("不支持的压缩算法：" + algo);
  }

  function buildChunks(text) {
    var rawBytes = utf8Bytes(text);
    var packed = compressPayload(rawBytes);
    var payloadBytes = packed.bytes;
    var maxBytes = Math.max(300, Math.min(1800, Number($("chunkSize").value) || 1000));
    var parts = splitBytes(payloadBytes, maxBytes);
    var id = makeId(rawBytes, payloadBytes, packed.algo);
    var total = parts.length;
    var rawCrc = crc32(rawBytes).toString(16).padStart(8, "0");
    var result = parts.map(function(part, i) {
      var partCrc = crc32(part).toString(16).padStart(8, "0");
      var payload = base64UrlFromBytes(part);
      return {
        id: id,
        index: i + 1,
        total: total,
        algo: packed.algo,
        note: packed.note,
        rawCrc: rawCrc,
        partCrc: partCrc,
        bytes: part.length,
        text: "QRZ1|" + id + "|" + (i + 1) + "|" + total + "|" + packed.algo + "|" + rawCrc + "|" + partCrc + "|" + payload
      };
    });
    result.meta = { rawBytes: rawBytes.length, payloadBytes: payloadBytes.length, algo: packed.algo, note: packed.note, rawCrc: rawCrc };
    return result;
  }

  function generateAll() {
    var input = $("input").value;
    if (!input) {
      $("sendInfo").innerHTML = '<span class="err">请输入文本。</span>';
      return;
    }
    chunks = buildChunks(input);
    currentIndex = 0;
    renderCurrentQr();
    renderChunkList();
    var meta = chunks.meta || {};
    var ratio = meta.rawBytes ? (meta.payloadBytes / meta.rawBytes * 100).toFixed(1) + "%" : "-";
    $("sendInfo").innerHTML = '<span class="ok">生成成功。</span> 算法：' + meta.algo +
      '；说明：' + meta.note +
      '；原文 UTF-8 字节数：' + meta.rawBytes +
      '；传输字节数：' + meta.payloadBytes +
      '；压缩率：' + ratio +
      '；二维码数量：' + chunks.length +
      '。请按顺序或乱序扫描，接收端会自动排序还原。';
  }

  function renderCurrentQr() {
    var canvas = $("canvas");
    var title = $("qrTitle");
    var meta = $("qrMeta");
    if (!chunks.length) {
      title.textContent = "等待生成";
      meta.textContent = "0 / 0";
      return;
    }
    var item = chunks[currentIndex];
    try {
      var qr = encodeText(item.text, $("ecc").value);
      drawQr(qr, canvas, $("scale").value, $("margin").value);
      title.textContent = "二维码分片 " + item.index + " / " + item.total;
      meta.textContent = item.bytes + " bytes · " + item.algo;
    } catch (e) {
      $("sendInfo").innerHTML = '<span class="err">' + escapeHtml(e.message) + '</span>';
    }
  }

  function renderChunkList() {
    var box = $("chunkList");
    box.innerHTML = "";
    chunks.forEach(function(c, i) {
      var div = document.createElement("div");
      div.className = "chunk-item";
      div.innerHTML = '<span>分片 ' + c.index + ' / ' + c.total + '，' + c.bytes + ' bytes，' + c.algo + '</span><span class="chip">CRC ' + c.partCrc + '</span>';
      div.onclick = function() {
        currentIndex = i;
        renderCurrentQr();
      };
      box.appendChild(div);
    });
  }

  function parseChunkLine(line) {
    line = line.trim();
    if (!line) return null;
    var parts = line.split("|");
    if (parts.length !== 8 || parts[0] !== "QRZ1") {
      throw new Error("不是合法 QRZ1 分片：" + line.slice(0, 80));
    }
    var id = parts[1];
    var index = Number(parts[2]);
    var total = Number(parts[3]);
    var algo = parts[4];
    var rawCrc = parts[5].toLowerCase();
    var partCrc = parts[6].toLowerCase();
    var payload = parts[7];
    if (!id || !Number.isInteger(index) || !Number.isInteger(total) || index < 1 || index > total) {
      throw new Error("分片序号错误：" + line.slice(0, 80));
    }
    if (algo !== "lzw" && algo !== "none") throw new Error("不支持的压缩算法：" + algo);
    var bytes = bytesFromBase64Url(payload);
    var actualCrc = crc32(bytes).toString(16).padStart(8, "0");
    if (actualCrc !== partCrc) {
      throw new Error("分片 CRC 校验失败：第 " + index + " 片，期望 " + partCrc + "，实际 " + actualCrc);
    }
    return { id: id, index: index, total: total, algo: algo, rawCrc: rawCrc, partCrc: partCrc, bytes: bytes };
  }

  function addScans() {
    var text = $("scanInput").value.trim();
    if (!text) {
      $("recvInfo").innerHTML = '<span class="err">请粘贴扫码结果。</span>';
      return;
    }

    var lines = text.split(/\n+/).map(function(x) { return x.trim(); }).filter(Boolean);
    var added = 0;
    try {
      lines.forEach(function(line) {
        var c = parseChunkLine(line);
        if (!c) return;
        if (!received[c.id]) received[c.id] = { total: c.total, algo: c.algo, rawCrc: c.rawCrc, chunks: {} };
        if (received[c.id].total !== c.total) throw new Error("同一批次 total 不一致：" + c.id);
        if (received[c.id].algo !== c.algo) throw new Error("同一批次算法不一致：" + c.id);
        if (received[c.id].rawCrc !== c.rawCrc) throw new Error("同一批次原文 CRC 不一致：" + c.id);
        if (!received[c.id].chunks[c.index]) added++;
        received[c.id].chunks[c.index] = c;
      });
      $("scanInput").value = "";
      renderReceived();
      tryMerge();
      $("recvInfo").innerHTML = '<span class="ok">导入成功。</span> 新增分片：' + added + '。';
    } catch (e) {
      $("recvInfo").innerHTML = '<span class="err">' + escapeHtml(e.message) + '</span>';
    }
  }

  function getActiveBatch() {
    var ids = Object.keys(received);
    if (!ids.length) return null;
    ids.sort(function(a, b) {
      return Object.keys(received[b].chunks).length - Object.keys(received[a].chunks).length;
    });
    return { id: ids[0], data: received[ids[0]] };
  }

  function renderReceived() {
    var box = $("recvList");
    box.innerHTML = "";
    var batch = getActiveBatch();
    if (!batch) {
      box.innerHTML = "";
      return;
    }
    var data = batch.data;
    for (var i = 1; i <= data.total; i++) {
      var div = document.createElement("div");
      div.className = "chunk-item";
      if (data.chunks[i]) {
        div.innerHTML = '<span>第 ' + i + ' / ' + data.total + ' 片，' + data.algo + '</span><span class="chip">已收到</span>';
      } else {
        div.innerHTML = '<span>第 ' + i + ' / ' + data.total + ' 片，' + data.algo + '</span><span class="chip">缺失</span>';
      }
      box.appendChild(div);
    }
  }

  function tryMerge() {
    var batch = getActiveBatch();
    if (!batch) return;
    var data = batch.data;
    var got = Object.keys(data.chunks).length;
    if (got < data.total) {
      $("output").value = "";
      $("recvInfo").innerHTML = '<span class="warn">尚未完整。</span> 当前批次：' + batch.id +
        '；已收到 ' + got + ' / ' + data.total + '。';
      return;
    }
    var payloadBytes = [];
    for (var i = 1; i <= data.total; i++) {
      payloadBytes = payloadBytes.concat(data.chunks[i].bytes);
    }
    var rawBytes = decompressPayload(payloadBytes, data.algo);
    var rawCrc = crc32(rawBytes).toString(16).padStart(8, "0");
    if (rawCrc !== data.rawCrc) throw new Error("原文 CRC 校验失败：期望 " + data.rawCrc + "，实际 " + rawCrc);
    $("output").value = bytesToText(rawBytes);
    $("recvInfo").innerHTML = '<span class="ok">还原完成。</span> 当前批次：' + batch.id +
      '；算法：' + data.algo +
      '；分片 ' + got + ' / ' + data.total +
      '；传输字节数：' + payloadBytes.length +
      '；还原字节数：' + rawBytes.length +
      '；原文 CRC：' + rawCrc + '。';
  }

  function downloadCurrent() {
    if (!chunks.length) return;
    var a = document.createElement("a");
    a.href = $("canvas").toDataURL("image/png");
    a.download = "qrcode_" + chunks[currentIndex].index + "_of_" + chunks[currentIndex].total + ".png";
    a.click();
  }

  function downloadAll() {
    if (!chunks.length) return;
    var old = currentIndex;
    for (var i = 0; i < chunks.length; i++) {
      currentIndex = i;
      renderCurrentQr();
      downloadCurrent();
    }
    currentIndex = old;
    renderCurrentQr();
  }

  function downloadTxt() {
    var val = $("output").value;
    if (!val) return;
    var blob = new Blob([val], { type: "text/plain;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "merged_text.txt";
    a.click();
    URL.revokeObjectURL(a.href);
  }

  function crc32(bytes) {
    var table = crc32.table || (crc32.table = makeCrcTable());
    var crc = -1;
    for (var i = 0; i < bytes.length; i++) {
      crc = (crc >>> 8) ^ table[(crc ^ bytes[i]) & 0xff];
    }
    return (crc ^ -1) >>> 0;
  }

  function makeCrcTable() {
    var table = [];
    for (var n = 0; n < 256; n++) {
      var c = n;
      for (var k = 0; k < 8; k++) {
        c = ((c & 1) ? (0xedb88320 ^ (c >>> 1)) : (c >>> 1));
      }
      table[n] = c >>> 0;
    }
    return table;
  }

  function getNumRawDataModules(ver) {
    var result = (16 * ver + 128) * ver + 64;
    if (ver >= 2) {
      var numAlign = Math.floor(ver / 7) + 2;
      result -= (25 * numAlign - 10) * numAlign - 55;
      if (ver >= 7) result -= 36;
    }
    return result;
  }

  function getNumDataCodewords(ver, ecl) {
    return Math.floor(getNumRawDataModules(ver) / 8)
      - ECC_CODEWORDS_PER_BLOCK[ecl][ver] * NUM_ERROR_CORRECTION_BLOCKS[ecl][ver];
  }

  function BitBuffer() { this.bits = []; }
  BitBuffer.prototype.appendBits = function(val, len) {
    if (len < 0 || len > 31 || val >>> len !== 0) throw new Error("appendBits 参数错误");
