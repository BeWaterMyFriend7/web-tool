<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AirGap Scan Accumulator 接收端 V4 NanoScan</title><style>
:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#334155;--primary:#2563eb;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}header{padding:12px 14px;background:#020617;border-bottom:1px solid var(--border)}h1{font-size:18px;margin:0 0 4px}.sub{font-size:12px;color:var(--muted);line-height:1.5}main{padding:10px;max-width:980px;margin:0 auto}.grid{display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:10px}.card{background:var(--panel);border:1px solid var(--border);border-radius:14px;padding:10px;margin-bottom:10px}.scanBox{position:relative;background:#000;border:3px solid #1d4ed8;border-radius:16px;overflow:hidden;min-height:min(76vw,680px)}#camera{position:relative;width:100%;height:min(76vw,680px);min-height:360px;background:#000}#camera video{width:100%!important;height:100%!important;object-fit:cover!important}.scanHint{position:absolute;left:50%;top:50%;width:72%;aspect-ratio:1/1;transform:translate(-50%,-50%);border:4px solid #2563eb;border-radius:22px;box-shadow:0 0 0 999px rgba(0,0,0,.08);z-index:5;pointer-events:none}.scanHint:before{content:"";position:absolute;inset:12px;border:2px dashed rgba(255,255,255,.72);border-radius:14px}.overlayTop,.overlayBottom{position:absolute;left:0;right:0;z-index:6;background:rgba(2,6,23,.82);padding:8px 10px}.overlayTop{top:0}.overlayBottom{bottom:0;font-size:12px;line-height:1.45;color:#fbbf24}.statLine{display:flex;justify-content:space-between;gap:8px;align-items:center}.big{font-size:20px;font-weight:800}.badge{border:1px solid #475569;border-radius:999px;padding:3px 8px;background:#0f172a;color:#cbd5e1;font-size:12px}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}button,select,input,textarea{border:1px solid var(--border);border-radius:10px;padding:9px 10px;font-size:14px;background:#020617;color:var(--text)}button{background:var(--primary);border-color:var(--primary);color:#fff;cursor:pointer}button.secondary{background:#1f2937;border-color:#475569}button.danger{background:#991b1b;border-color:#991b1b}label{display:block;color:var(--muted);font-size:13px;margin:8px 0 4px}textarea{width:100%;min-height:100px;font-family:Consolas,Menlo,monospace;line-height:1.5}.progress{height:14px;background:#1e293b;border-radius:999px;overflow:hidden;margin:10px 0}.progress>div{height:100%;width:0;background:var(--primary)}.stats{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}.stat{background:#020617;border:1px solid var(--border);border-radius:12px;padding:10px}.stat b{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}.missing{font-family:Consolas,Menlo,monospace;color:#fbbf24;word-break:break-word;line-height:1.5}.log{white-space:pre-wrap;font-family:Consolas,Menlo,monospace;font-size:12px;line-height:1.5;color:#d1d5db;background:#020617;border:1px solid var(--border);border-radius:12px;padding:10px;max-height:170px;overflow:auto}.output{min-height:180px}.ok{color:var(--ok)}.warn{color:var(--warn)}.err{color:var(--danger)}@media(max-width:900px){.grid{grid-template-columns:1fr}#camera{height:min(96vw,680px)}.scanBox{min-height:min(96vw,680px)}}
</style></head><body><header><h1>AirGap Scan Accumulator 接收端 V4 NanoScan</h1><div class="sub">接收端联网版：优先加载 NanoScan/zxing-wasm 扫单个超大二维码；扫到即累加。页面需要 HTTPS，适合部署到 GitHub Pages。</div></header><main><div class="grid"><section><div class="card"><div class="row"><button id="loadLib">加载 NanoScan</button><button id="start">开始扫码累加</button><button class="danger" id="stop">停止摄像头</button><button class="secondary" id="clear">清空进度</button></div><div class="row"><label>识别 FPS<select id="fps"><option value="5" selected>5，推荐</option><option value="8">8，积极</option><option value="3">3，省电</option></select></label><label>分辨率<select id="resolution"><option value="720" selected>720×720</option><option value="1080">1080×1080</option></select></label><label>缩放<select id="zoom"><option value="1">1.0</option><option value="1.5" selected>1.5</option><option value="2">2.0</option></select></label><label>成功暂停<select id="cooldown"><option value="700">700ms</option><option value="1000" selected>1000ms</option><option value="1500">1500ms</option></select></label></div></div><div class="scanBox"><div id="camera"></div><div class="scanHint"></div><div class="overlayTop"><div class="statLine"><div class="big" id="topProgress">0 / 0</div><div class="badge" id="phase">未开始</div></div></div><div class="overlayBottom" id="advice">让蓝色框覆盖发送端超大二维码。扫到一个分片后会自动累加并短暂停顿。</div></div><div class="card"><div class="log" id="log">准备就绪。第一次点击“加载 NanoScan”会通过 CDN 加载 nano-scan。</div></div></section><aside><div class="card"><div class="stats"><div class="stat"><b id="got">0/0</b><span>已收分片</span></div><div class="stat"><b id="pct">0%</b><span>完成率</span></div><div class="stat"><b id="hits">0</b><span>新增次数</span></div><div class="stat"><b id="recent">-</b><span>最近分片</span></div></div><div class="progress"><div id="bar"></div></div><label>缺失分片</label><div class="missing" id="missing">尚未开始。</div><div class="row" style="margin-top:8px"><button class="secondary" id="copyMissing">复制缺片</button></div></div><div class="card"><label>手动补充：可粘贴微信/其他扫码器识别出的 QRZ2，一行一个</label><textarea id="manual" placeholder="QRZ2|..."></textarea><div class="row"><button class="secondary" id="importManual">导入手动内容</button></div></div><div class="card"><label>还原后的原文</label><textarea id="output" class="output" placeholder="收齐后自动输出"></textarea><div class="row"><button class="secondary" id="copyOutput">复制结果</button><button class="secondary" id="downloadOutput">下载 TXT</button></div></div></aside></div></main><script type="module">
let NanoScanCtor=null,scanner=null,running=false,coolingUntil=0,received={},rawSeen={},hitCount=0;const STORE_KEY="airgap_scan_accumulator_v4_state";const $=id=>document.getElementById(id);function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function log(msg,level){const cls=level==="err"?"err":level==="ok"?"ok":level==="warn"?"warn":"";$("log").innerHTML=`<span class="${cls}">[${new Date().toLocaleTimeString()}] ${esc(msg)}</span>\n`+$("log").innerHTML}function setPhase(s){$("phase").textContent=s}function makeCrcTable(){const table=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);table[n]=c>>>0}return table}function crc32(bytes){const table=crc32.table||(crc32.table=makeCrcTable());let crc=-1;for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^table[(crc^bytes[i])&255];return(crc^-1)>>>0}function bytesFromBase64Url(s){s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";const bin=atob(s),bytes=[];for(let i=0;i<bin.length;i++)bytes.push(bin.charCodeAt(i));return bytes}function bytesToText(bytes){return new TextDecoder("utf-8").decode(new Uint8Array(bytes))}function readU16(a,o){return(a[o]<<8)|a[o+1]}function readU32(a,o){return((a[o]<<24)|(a[o+1]<<16)|(a[o+2]<<8)|a[o+3])>>>0}function lzwDecompressBytes(input){if(!input.length)return[];if(input.length%2!==0)throw new Error("LZW 数据长度错误");const codes=[];for(let i=0;i<input.length;i+=2)codes.push((input[i]<<8)|input[i+1]);const dict=[];for(let j=0;j<256;j++)dict[j]=[j];let dictSize=256,first=codes[0];if(!dict[first])throw new Error("LZW 首码错误");let w=dict[first].slice(),out=w.slice();for(let k=1;k<codes.length;k++){const code=codes[k];let entry;if(dict[code])entry=dict[code].slice();else if(code===dictSize)entry=w.concat([w[0]]);else throw new Error("LZW 解码失败："+code);out=out.concat(entry);if(dictSize<65535)dict[dictSize++]=w.concat([entry[0]]);w=entry}return out}function decompressPayload(payloadBytes,algo){if(algo==="none")return payloadBytes;if(algo==="lzw")return lzwDecompressBytes(payloadBytes);throw new Error("不支持的压缩算法："+algo)}function parseQRZ2(line){const s=String(line||"").trim();if(!s.startsWith("QRZ2|"))return null;const bytes=bytesFromBase64Url(s.slice(5));if(bytes.length<22)throw new Error("QRZ2 数据过短");const magic=String.fromCharCode(bytes[0],bytes[1],bytes[2],bytes[3]);if(magic!=="QZ2!")throw new Error("QRZ2 magic 错误");const algo=bytes[5]===1?"lzw":"none",id=readU32(bytes,6).toString(16).padStart(8,"0"),index=readU16(bytes,10),total=readU16(bytes,12),rawCrc=readU32(bytes,14).toString(16).padStart(8,"0"),partCrc=readU32(bytes,18).toString(16).padStart(8,"0"),payload=Array.from(bytes.slice(22)),actual=crc32(payload).toString(16).padStart(8,"0");if(actual!==partCrc)throw new Error("分片 CRC 失败："+index);return{id,index,total,algo,rawCrc,partCrc,bytes:payload}}function parseQRZ1(line){const parts=String(line||"").trim().split("|");if(parts.length!==8||parts[0]!=="QRZ1")return null;const id=parts[1],index=Number(parts[2]),total=Number(parts[3]),algo=parts[4],rawCrc=parts[5].toLowerCase(),partCrc=parts[6].toLowerCase(),bytes=bytesFromBase64Url(parts[7]),actual=crc32(bytes).toString(16).padStart(8,"0");if(actual!==partCrc)throw new Error("分片 CRC 失败："+index);return{id,index,total,algo,rawCrc,partCrc,bytes}}function parseChunk(text){if(String(text).startsWith("QRZ2|"))return parseQRZ2(text);if(String(text).startsWith("QRZ1|"))return parseQRZ1(text);return null}function addRaw(text,source="scan"){if(!text||rawSeen[text])return false;const c=parseChunk(text);if(!c)return false;rawSeen[text]=true;if(!received[c.id])received[c.id]={total:c.total,algo:c.algo,rawCrc:c.rawCrc,chunks:{}};const b=received[c.id];if(b.chunks[c.index])return false;b.chunks[c.index]=c;hitCount++;$("recent").textContent="#"+c.index;if(navigator.vibrate)navigator.vibrate(80);log(`新增分片 #${c.index}/${c.total}（${source}）`,"ok");saveState();renderProgress();tryMerge();return true}function getActiveBatch(){const ids=Object.keys(received);if(!ids.length)return null;ids.sort((a,b)=>Object.keys(received[b].chunks).length-Object.keys(received[a].chunks).length);return{id:ids[0],data:received[ids[0]]}}function missingList(){const b=getActiveBatch();if(!b)return[];const arr=[];for(let i=1;i<=b.data.total;i++)if(!b.data.chunks[i])arr.push(i);return arr}function renderProgress(){const b=getActiveBatch();$("hits").textContent=String(hitCount);if(!b){$("got").textContent="0/0";$("pct").textContent="0%";$("bar").style.width="0%";$("missing").textContent="尚未开始。";$("topProgress").textContent="0 / 0";return}const got=Object.keys(b.data.chunks).length,total=b.data.total,pct=got/total*100;$("got").textContent=got+"/"+total;$("topProgress").textContent=got+" / "+total;$("pct").textContent=pct.toFixed(1)+"%";$("bar").style.width=pct+"%";const miss=missingList();$("missing").textContent=miss.length?miss.slice(0,200).join(", ")+(miss.length>200?" ...":""):"已收齐"}function tryMerge(){const b=getActiveBatch();if(!b)return;const data=b.data,got=Object.keys(data.chunks).length;if(got<data.total)return;let payload=[];for(let i=1;i<=data.total;i++)payload=payload.concat(data.chunks[i].bytes);const raw=decompressPayload(payload,data.algo),rawCrc=crc32(raw).toString(16).padStart(8,"0");if(rawCrc!==data.rawCrc)throw new Error("原文 CRC 校验失败：期望 "+data.rawCrc+" 实际 "+rawCrc);$("output").value=bytesToText(raw);setPhase("已完成");log("还原完成。原文 CRC "+rawCrc,"ok")}function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify({received,rawSeen,hitCount,updatedAt:Date.now()}))}catch(e){}}function loadState(){try{const s=localStorage.getItem(STORE_KEY);if(!s)return;const obj=JSON.parse(s);if(obj&&obj.received){received=obj.received||{};rawSeen=obj.rawSeen||{};hitCount=obj.hitCount||0;renderProgress();log("已恢复本地缓存进度。","ok")}}catch(e){}}function clearState(){received={};rawSeen={};hitCount=0;$("recent").textContent="-";$("output").value="";localStorage.removeItem(STORE_KEY);renderProgress();log("已清空进度。","ok")}async function importNanoScan(){if(NanoScanCtor)return NanoScanCtor;const urls=["https://esm.sh/nano-scan@latest","https://cdn.jsdelivr.net/npm/nano-scan/+esm"];let lastErr=null;for(const url of urls){try{log("加载 NanoScan："+url,"warn");const mod=await import(url);NanoScanCtor=mod.default||mod.NanoScan;if(!NanoScanCtor)throw new Error("模块未导出 NanoScan");log("NanoScan 加载成功。","ok");return NanoScanCtor}catch(e){lastErr=e;log("加载失败："+e.message,"warn")}}throw lastErr||new Error("NanoScan 加载失败")}function onScanResult(result){const now=Date.now();if(now<coolingUntil)return;const text=typeof result==="string"?result:(result&&result.text)||(result&&result.rawValue)||String(result||"");if(!text.startsWith("QRZ1|")&&!text.startsWith("QRZ2|"))return;try{const added=addRaw(text,"NanoScan");if(added){coolingUntil=Date.now()+Number($("cooldown").value||1000);setPhase("已扫到，暂停");$("advice").textContent="已扫到一个新分片。等待发送端切到下一张，稍后自动继续识别。";setTimeout(()=>{if(running){setPhase("识别中");$("advice").textContent="继续识别下一张。让蓝色框覆盖发送端二维码。"}},Number($("cooldown").value||1000))}}catch(e){log(e.message,"err")}}async function startScan(){try{await importNanoScan();if(scanner){try{scanner.stopScan()}catch(e){}scanner=null}const size=Number($("resolution").value||720);scanner=new NanoScanCtor({container:$("camera"),resolution:{width:size,height:size},fps:Number($("fps").value||5),zoom:Number($("zoom").value||1.5),marker:true,frame:true,trick:true,zxingOptions:{tryHarder:true,formats:["QRCode"],maxNumberOfSymbols:1},onScan:onScanResult,onError:e=>log("扫码错误："+(e&&e.message?e.message:e),"warn")});await scanner.startScan();running=true;setPhase("识别中");$("advice").textContent="摄像头已打开。请让蓝色框覆盖发送端超大二维码。";log("扫码已启动。扫到后自动累加。","ok")}catch(e){running=false;setPhase("启动失败");log("启动失败："+e.message+"。请确认页面是 HTTPS、摄像头权限已允许、CDN 可访问。","err")}}function stopScan(){running=false;if(scanner){try{scanner.stopScan()}catch(e){}scanner=null}setPhase("已停止");$("advice").textContent="摄像头已停止。";log("已停止摄像头。","warn")}function importManual(){const lines=($("manual").value||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean);let added=0;lines.forEach(line=>{try{if(addRaw(line,"manual"))added++}catch(e){log(e.message,"err")}});log("手动导入完成，新增 "+added+" 个分片。","ok")}function copyMissing(){const m=missingList().join(",");if(!m){log("当前没有缺片。","ok");return}navigator.clipboard&&navigator.clipboard.writeText(m);log("已复制缺片列表。","ok")}function copyOutput(){const v=$("output").value;if(!v)return;navigator.clipboard&&navigator.clipboard.writeText(v);log("已复制结果。","ok")}function downloadOutput(){const v=$("output").value;if(!v)return;const blob=new Blob([v],{type:"text/plain;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="airgap_restored_text.txt";a.click();URL.revokeObjectURL(a.href)}$("loadLib").onclick=importNanoScan;$("start").onclick=startScan;$("stop").onclick=stopScan;$("clear").onclick=clearState;$("importManual").onclick=importManual;$("copyMissing").onclick=copyMissing;$("copyOutput").onclick=copyOutput;$("downloadOutput").onclick=downloadOutput;loadState();renderProgress();
</script></body></html>
