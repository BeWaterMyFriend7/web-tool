<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>AirGap Scan Accumulator V4</title><style>body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif;background:#0f172a;color:#e5e7eb;margin:0}main{max-width:860px;margin:60px auto;padding:0 20px}.card{background:#111827;border:1px solid #334155;border-radius:18px;padding:24px;margin:18px 0}a{color:#93c5fd;font-size:20px;font-weight:700}p{color:#cbd5e1;line-height:1.7}code{background:#020617;border:1px solid #334155;border-radius:6px;padding:2px 6px}</style></head><body><main><h1>AirGap Scan Accumulator V4</h1><p>同一仓库包含发送端和接收端。发送端可本地双击打开，也可作为备份部署在 GitHub Pages；接收端建议通过 GitHub Pages HTTPS 打开。</p><div class="card"><a href="./sender_scan_v4.html">sender_scan_v4.html</a><p>内网发送端：输入文本，生成 QRZ2 分片，单个超大二维码播放。</p></div><div class="card"><a href="./receiver_nanoscan_v4.html">receiver_nanoscan_v4.html</a><p>外网接收端：NanoScan 扫码累加，localStorage 保存进度，缺片补扫，收齐后还原文本。</p></div><p>部署说明见 <code>README_GITHUB_PAGES.md</code>。</p></main></body></html>
