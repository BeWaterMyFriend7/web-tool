<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AirGap Scan Accumulator 接收端 V4.2.4 Smooth Follow</title>
<style>
:root{--bg:#0f172a;--panel:#111827;--text:#e5e7eb;--muted:#94a3b8;--border:#334155;--primary:#2563eb;--ok:#10b981;--warn:#f59e0b;--danger:#ef4444}
*{box-sizing:border-box} body{margin:0;background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Microsoft YaHei",Arial,sans-serif}
main{max-width:820px;margin:0 auto;padding:8px} .card{background:var(--panel);border:1px solid var(--border);border-radius:12px;padding:9px;margin-bottom:8px}
.top{display:flex;justify-content:space-between;gap:8px;align-items:center} .big{font-size:22px;font-weight:800} .phase{font-size:12px;border:1px solid #475569;border-radius:999px;padding:3px 8px;background:#020617;color:#cbd5e1}
.row{display:flex;gap:6px;flex-wrap:wrap;align-items:center} button,select,textarea{border:1px solid var(--border);border-radius:9px;padding:8px 9px;font-size:13px;background:#020617;color:var(--text)}
button{background:var(--primary);border-color:var(--primary);color:#fff;cursor:pointer} button.secondary{background:#1f2937;border-color:#475569} button.danger{background:#991b1b;border-color:#991b1b}
label{font-size:12px;color:var(--muted)} .scanBox{background:#000;border:2px solid #1d4ed8;border-radius:14px;overflow:hidden} #camera{width:100%;height:min(76vw,560px);min-height:300px;background:#000} #camera video{width:100%!important;height:100%!important;object-fit:cover!important}
.progress{height:12px;background:#1e293b;border-radius:999px;overflow:hidden;margin:8px 0} .progress>div{height:100%;width:0;background:var(--primary)}
.compact{font-size:12px;color:#cbd5e1;line-height:1.45} .warnText{color:#fbbf24} .missing{font-family:Consolas,Menlo,Monaco,monospace;color:#fbbf24;word-break:break-word;line-height:1.45}
textarea{width:100%;min-height:90px;font-family:Consolas,Menlo,Monaco,monospace;line-height:1.45} details{margin-top:8px} summary{cursor:pointer;color:#93c5fd} .log{white-space:pre-wrap;font-family:Consolas,Menlo,Monaco,monospace;font-size:12px;line-height:1.45;color:#d1d5db;background:#020617;border:1px solid var(--border);border-radius:10px;padding:8px;max-height:140px;overflow:auto}
.ok{color:var(--ok)}.warn{color:var(--warn)}.err{color:var(--danger)}
@media(max-width:600px){main{padding:6px}#camera{height:min(92vw,540px)}button,select{font-size:12px;padding:7px 8px}}
</style>
</head>
<body>
<main>
  <section class="card top">
    <div><div class="big" id="topProgress">0 / 0</div><div class="compact">最近：<span id="recent">-</span>｜新增：<span id="hits">0</span></div></div>
    <div class="phase" id="phase">未开始</div>
  </section>

  <section class="card">
    <div class="row">
      <button id="loadLib">加载 NanoScan</button>
      <button id="start">开始自动接收</button>
      <button class="danger" id="stop">停止摄像头</button>
      <button class="secondary" id="clear">新任务/清空</button>
    </div>
    <div class="row" style="margin-top:6px">
      <label>模式 <select id="scanMode"><option value="continuous" selected>跟手优先：相机常开低频识别</option><option value="single">省电防卡：扫到即停并自动重开</option></select></label>
      <label><input type="checkbox" id="autoContinue" checked /> 跟随发送端自动轮播</label>
      <label>单片重启 <select id="autoDelay"><option value="200">200ms</option><option value="300" selected>300ms</option><option value="400">400ms</option><option value="600">600ms</option></select></label>
    </div>
    <div class="row" style="margin-top:6px">
      <label>FPS <select id="fps"><option value="1" selected>1 最省</option><option value="2">2</option><option value="3">3</option></select></label>
      <label>分辨率 <select id="resolution"><option value="360" selected>360</option><option value="480">480</option><option value="640">640</option></select></label>
      <label>缩放 <select id="zoom"><option value="1" selected>1.0</option><option value="1.2">1.2</option><option value="1.5">1.5</option></select></label>
      <label>接收冷却 <select id="cooldown"><option value="300">300ms</option><option value="400">400ms</option><option value="500" selected>500ms</option><option value="700">700ms</option><option value="1000">1000ms</option></select></label>
    </div>
  </section>

  <section class="scanBox"><div id="camera"></div></section>
  <section class="card compact warnText" id="advice">V4.2.4 默认“跟手优先”：相机常开、低频识别。建议发送端播放 600ms，接收冷却 500ms，接收端略短于发送端。</section>

  <section class="card compact">
    <div>进度：<b id="got">0/0</b>，完成率：<b id="pct">0%</b></div>
    <div class="progress"><div id="bar"></div></div>
    <div>缺片：<span id="missing" class="missing">尚未开始。</span></div>
    <div class="row" style="margin-top:6px"><button class="secondary" id="copyMissing">复制缺片</button></div>
  </section>

  <details class="card">
    <summary>手动补充 / 结果 / 日志</summary>
    <label class="compact">手动补充 QRZ2，一行一个</label>
    <textarea id="manual" placeholder="QRZ2|..."></textarea>
    <div class="row"><button class="secondary" id="importManual">导入手动内容</button></div>
    <label class="compact">还原后的原文</label>
    <textarea id="output" placeholder="收齐后自动输出"></textarea>
    <div class="row"><button class="secondary" id="copyOutput">复制结果</button><button class="secondary" id="downloadOutput">下载 TXT</button></div>
    <div class="log" id="log">准备就绪。</div>
  </details>
</main>
<script type="module">

let NanoScanCtor=null,scanner=null,running=false,coolingUntil=0,received={},rawSeen={},hitCount=0,logLines=[],autoTimer=null,autoActive=false,mediaPatched=false,rawGetUserMedia=null,activeStreams=new Set();const STORE_KEY="airgap_scan_accumulator_v4_2_4_state";const $=id=>document.getElementById(id);function esc(s){return String(s).replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]))}function log(msg,level){const cls=level==="err"?"err":level==="ok"?"ok":level==="warn"?"warn":"";logLines.unshift(`<span class="${cls}">[${new Date().toLocaleTimeString()}] ${esc(msg)}</span>`);if(logLines.length>30)logLines.length=30;$("log").innerHTML=logLines.join("\\n")}function setPhase(s){$("phase").textContent=s}function cancelAuto(){if(autoTimer){clearTimeout(autoTimer);autoTimer=null}}function installMediaPatch(){try{if(mediaPatched||!navigator.mediaDevices||!navigator.mediaDevices.getUserMedia)return;rawGetUserMedia=navigator.mediaDevices.getUserMedia.bind(navigator.mediaDevices);navigator.mediaDevices.getUserMedia=async function(c){const stream=await rawGetUserMedia(c);activeStreams.add(stream);stream.getTracks&&stream.getTracks().forEach(t=>t.addEventListener&&t.addEventListener("ended",()=>{try{activeStreams.delete(stream)}catch(e){}}));return stream};mediaPatched=true}catch(e){}}function stopAllTracks(){try{activeStreams.forEach(s=>{try{s.getTracks&&s.getTracks().forEach(t=>{try{t.stop()}catch(e){}})}catch(e){}});activeStreams.clear()}catch(e){}}function makeCrcTable(){const table=[];for(let n=0;n<256;n++){let c=n;for(let k=0;k<8;k++)c=(c&1)?(0xedb88320^(c>>>1)):(c>>>1);table[n]=c>>>0}return table}function crc32(bytes){const table=crc32.table||(crc32.table=makeCrcTable());let crc=-1;for(let i=0;i<bytes.length;i++)crc=(crc>>>8)^table[(crc^bytes[i])&255];return(crc^-1)>>>0}function bytesFromBase64Url(s){s=s.replace(/-/g,"+").replace(/_/g,"/");while(s.length%4)s+="=";const bin=atob(s),bytes=[];for(let i=0;i<bin.length;i++)bytes.push(bin.charCodeAt(i));return bytes}function bytesToText(bytes){return new TextDecoder("utf-8").decode(new Uint8Array(bytes))}function readU16(a,o){return(a[o]<<8)|a[o+1]}function readU32(a,o){return((a[o]<<24)|(a[o+1]<<16)|(a[o+2]<<8)|a[o+3])>>>0}function lzwDecompressBytes(input){if(!input.length)return[];if(input.length%2!==0)throw new Error("LZW 数据长度错误");const codes=[];for(let i=0;i<input.length;i+=2)codes.push((input[i]<<8)|input[i+1]);const dict=[];for(let j=0;j<256;j++)dict[j]=[j];let dictSize=256,first=codes[0];if(!dict[first])throw new Error("LZW 首码错误");let w=dict[first].slice(),out=w.slice();for(let k=1;k<codes.length;k++){const code=codes[k];let entry;if(dict[code])entry=dict[code].slice();else if(code===dictSize)entry=w.concat([w[0]]);else throw new Error("LZW 解码失败："+code);out=out.concat(entry);if(dictSize<65535)dict[dictSize++]=w.concat([entry[0]]);w=entry}return out}function decompressPayload(payloadBytes,algo){if(algo==="none")return payloadBytes;if(algo==="lzw")return lzwDecompressBytes(payloadBytes);throw new Error("不支持的压缩算法："+algo)}function parseQRZ2(line){const s=String(line||"").trim();if(!s.startsWith("QRZ2|"))return null;const bytes=bytesFromBase64Url(s.slice(5));if(bytes.length<22)throw new Error("QRZ2 数据过短");const magic=String.fromCharCode(bytes[0],bytes[1],bytes[2],bytes[3]);if(magic!=="QZ2!")throw new Error("QRZ2 magic 错误");const algo=bytes[5]===1?"lzw":"none",id=readU32(bytes,6).toString(16).padStart(8,"0"),index=readU16(bytes,10),total=readU16(bytes,12),rawCrc=readU32(bytes,14).toString(16).padStart(8,"0"),partCrc=readU32(bytes,18).toString(16).padStart(8,"0"),payload=Array.from(bytes.slice(22)),actual=crc32(payload).toString(16).padStart(8,"0");if(actual!==partCrc)throw new Error("分片 CRC 失败："+index);return{id,index,total,algo,rawCrc,partCrc,bytes:payload}}function parseQRZ1(line){const parts=String(line||"").trim().split("|");if(parts.length!==8||parts[0]!=="QRZ1")return null;const id=parts[1],index=Number(parts[2]),total=Number(parts[3]),algo=parts[4],rawCrc=parts[5].toLowerCase(),partCrc=parts[6].toLowerCase(),bytes=bytesFromBase64Url(parts[7]),actual=crc32(bytes).toString(16).padStart(8,"0");if(actual!==partCrc)throw new Error("分片 CRC 失败："+index);return{id,index,total,algo,rawCrc,partCrc,bytes}}function parseChunk(text){if(String(text).startsWith("QRZ2|"))return parseQRZ2(text);if(String(text).startsWith("QRZ1|"))return parseQRZ1(text);return null}function addRaw(text,source="scan"){if(!text||rawSeen[text])return false;const c=parseChunk(text);if(!c)return false;rawSeen[text]=true;if(!received[c.id])received[c.id]={total:c.total,algo:c.algo,rawCrc:c.rawCrc,chunks:{}};const b=received[c.id];if(b.chunks[c.index])return false;b.chunks[c.index]=c;hitCount++;$("recent").textContent="#"+c.index;if(navigator.vibrate)navigator.vibrate(80);log(`新增分片 #${c.index}/${c.total}（${source}）`,"ok");saveState();renderProgress();tryMerge();return true}function getActiveBatch(){const ids=Object.keys(received);if(!ids.length)return null;ids.sort((a,b)=>Object.keys(received[b].chunks).length-Object.keys(received[a].chunks).length);return{id:ids[0],data:received[ids[0]]}}function missingList(){const b=getActiveBatch();if(!b)return[];const arr=[];for(let i=1;i<=b.data.total;i++)if(!b.data.chunks[i])arr.push(i);return arr}
function isComplete(){const b=getActiveBatch();return !!(b&&Object.keys(b.data.chunks).length>=b.data.total)}function renderProgress(){const b=getActiveBatch();$("hits").textContent=String(hitCount);if(!b){$("got").textContent="0/0";$("pct").textContent="0%";$("bar").style.width="0%";$("missing").textContent="尚未开始。";$("topProgress").textContent="0 / 0";return}const got=Object.keys(b.data.chunks).length,total=b.data.total,pct=got/total*100;$("got").textContent=got+"/"+total;$("topProgress").textContent=got+" / "+total;$("pct").textContent=pct.toFixed(1)+"%";$("bar").style.width=pct+"%";const miss=missingList();$("missing").textContent=miss.length?miss.slice(0,200).join(", ")+(miss.length>200?" ...":""):"已收齐"}function tryMerge(){const b=getActiveBatch();if(!b)return;const data=b.data,got=Object.keys(data.chunks).length;if(got<data.total)return;let payload=[];for(let i=1;i<=data.total;i++)payload=payload.concat(data.chunks[i].bytes);const raw=decompressPayload(payload,data.algo),rawCrc=crc32(raw).toString(16).padStart(8,"0");if(rawCrc!==data.rawCrc)throw new Error("原文 CRC 校验失败：期望 "+data.rawCrc+" 实际 "+rawCrc);$("output").value=bytesToText(raw);setPhase("已完成");log("还原完成。原文 CRC "+rawCrc,"ok")}function saveState(){try{localStorage.setItem(STORE_KEY,JSON.stringify({received,rawSeen,hitCount,updatedAt:Date.now()}))}catch(e){}}function loadState(){try{const s=localStorage.getItem(STORE_KEY);if(!s)return;const obj=JSON.parse(s);if(obj&&obj.received){received=obj.received||{};rawSeen=obj.rawSeen||{};hitCount=obj.hitCount||0;renderProgress();log("已恢复本地缓存进度。","ok")}}catch(e){}}async function clearState(){
  await stopScan(true);
  received={};rawSeen={};hitCount=0;$("recent").textContent="-";$("output").value="";localStorage.removeItem(STORE_KEY);renderProgress();log("已清空进度，并已释放摄像头。","ok")
}async function importNanoScan(){if(NanoScanCtor)return NanoScanCtor;const urls=["https://esm.sh/nano-scan@latest","https://cdn.jsdelivr.net/npm/nano-scan/+esm"];let lastErr=null;for(const url of urls){try{log("加载 NanoScan："+url,"warn");const mod=await import(url);NanoScanCtor=mod.default||mod.NanoScan;if(!NanoScanCtor)throw new Error("模块未导出 NanoScan");log("NanoScan 加载成功。","ok");return NanoScanCtor}catch(e){lastErr=e;log("加载失败："+e.message,"warn")}}throw lastErr||new Error("NanoScan 加载失败")}function onScanResult(result){
  const now=Date.now();
  if(now<coolingUntil)return;
  const text=typeof result==="string"?result:(result&&result.text)||(result&&result.rawValue)||String(result||"");
  if(!text.startsWith("QRZ1|")&&!text.startsWith("QRZ2|"))return;
  try{
    const added=addRaw(text,"NanoScan");
    if(added){
      const mode=$("scanMode")?$("scanMode").value:"single";
      const delay=Number($("autoDelay")&&$("autoDelay").value||300);
      if(mode==="single"){
        coolingUntil=Date.now()+Math.max(150,delay);
        setPhase("已扫到，已释放");
        $("advice").textContent="已扫到一个新分片，正在彻底释放摄像头。切到下一张后再继续扫描。";
        stopScan(true,true).then(()=>{
          if(autoActive&&$("autoContinue")&&$("autoContinue").checked&&!isComplete()){
            autoTimer=setTimeout(()=>{autoTimer=null;if(autoActive&&!running)startScan()}, delay);
          }
        });
        return;
      }
      coolingUntil=Date.now()+Number($("cooldown").value||500);
      setPhase("已扫到，冷却");
      $("advice").textContent="已扫到一个新分片。跟手优先模式下相机保持常开，接收冷却应短于发送端播放间隔。";
      setTimeout(()=>{if(running){setPhase("识别中");$("advice").textContent="继续识别下一张。发送端建议 3000ms，接收冷却建议 2200ms。"}},Number($("cooldown").value||500));
    }
  }catch(e){log(e.message,"err")}
}
async function startScan(){try{autoActive=true;cancelAuto();await importNanoScan();installMediaPatch();if(scanner){try{scanner.stopScan()}catch(e){}scanner=null}if(running){log("摄像头已在运行，请先停止。","warn");return}
    const size=Number($("resolution").value||360);
    scanner=new NanoScanCtor({container:$("camera"),resolution:{width:size,height:size},fps:Number($("fps").value||1),zoom:Number($("zoom").value||1),marker:true,frame:true,trick:false,zxingOptions:{tryHarder:true,formats:["QRCode"],maxNumberOfSymbols:1},onScan:onScanResult,onError:e=>log("扫码错误："+(e&&e.message?e.message:e),"warn")});await scanner.startScan();running=true;setPhase("识别中");$("advice").textContent="摄像头已打开。当前默认跟手优先：相机常开、fps=1、360 分辨率。发送端建议播放 600ms。";log("扫码已启动。V4.2.4 默认自动单片循环；扫到后释放摄像头并自动重开。","ok")}catch(e){running=false;setPhase("启动失败");log("启动失败："+e.message+"。请确认页面是 HTTPS、摄像头权限已允许、CDN 可访问。","err")}}async function stopScan(silent=false,keepAuto=false){
  if(!keepAuto){autoActive=false;cancelAuto()}
  running=false;
  try{
    if(scanner){
      const ret=scanner.stopScan&&scanner.stopScan();
      if(ret&&typeof ret.then==="function") await ret;
    }
  }catch(e){ if(!silent)log("NanoScan 停止异常："+e.message,"warn") }
  scanner=null;
  stopAllTracks();
  try{
    const cam=$("camera");
    cam.querySelectorAll("video").forEach(v=>{
      try{
        const s=v.srcObject;
        if(s&&s.getTracks)s.getTracks().forEach(t=>{try{t.stop()}catch(e){}});
        v.pause&&v.pause();
        v.srcObject=null;
        v.removeAttribute("src");
        v.load&&v.load();
      }catch(e){}
    });
    cam.innerHTML="";
  }catch(e){}
  setPhase("已停止");
  $("advice").textContent="摄像头已停止并已清空预览容器。";
  if(!silent)log("已彻底停止摄像头并清空预览容器。","warn");
}function importManual(){const lines=($("manual").value||"").split(/\r?\n/).map(s=>s.trim()).filter(Boolean);let added=0;lines.forEach(line=>{try{if(addRaw(line,"manual"))added++}catch(e){log(e.message,"err")}});log("手动导入完成，新增 "+added+" 个分片。","ok")}function copyMissing(){const m=missingList().join(",");if(!m){log("当前没有缺片。","ok");return}navigator.clipboard&&navigator.clipboard.writeText(m);log("已复制缺片列表。","ok")}function copyOutput(){const v=$("output").value;if(!v)return;navigator.clipboard&&navigator.clipboard.writeText(v);log("已复制结果。","ok")}function downloadOutput(){const v=$("output").value;if(!v)return;const blob=new Blob([v],{type:"text/plain;charset=utf-8"}),a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="airgap_restored_text.txt";a.click();URL.revokeObjectURL(a.href)}window.addEventListener("pagehide",()=>{stopScan(true,false)});
$("loadLib").onclick=importNanoScan;$("start").onclick=()=>startScan();$("stop").onclick=()=>stopScan(false,false);$("clear").onclick=clearState;$("importManual").onclick=importManual;$("copyMissing").onclick=copyMissing;$("copyOutput").onclick=copyOutput;$("downloadOutput").onclick=downloadOutput;loadState();renderProgress();

</script>
</body>
</html>
